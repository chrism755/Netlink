<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - NETLINK</title>
  <style>
    body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#0f172a}
    .card{width:340px;padding:30px;background:#1e293b;color:white;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
    input{width:100%;padding:12px;margin:8px 0;border:1px solid #334155;border-radius:8px;background:#0f172a;color:white;box-sizing:border-box}
    button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#3b82f6;color:white;font-weight:bold;cursor:pointer}
    button:hover{opacity:0.9}
    .divider{text-align:center;margin:15px 0;color:#94a3b8}
    .social{background:#24292e}
    #msg{font-size:14px;margin-top:10px;text-align:center;min-height:20px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password 6+ chars" required>
    <button onclick="signup()">Sign up with Email</button>
    
    <div class="divider">OR</div>
    
    <button class="social" onclick="googleLogin()">Continue with Google</button>
    <button class="social" onclick="githubLogin()">Continue with GitHub</button>
    
    <p id="msg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyApkq77W_u_EDNgLfuHopoqSnnd1kiuoCY",
      authDomain: "rajytech-8814e.firebaseapp.com",
      projectId: "rajytech-8814e",
      storageBucket: "rajytech-8814e.firebasestorage.app",
      messagingSenderId: "309859828292",
      appId: "1:309859828292:web:a90aa608668f1f40193211",
      measurementId: "G-26YMZ91PFC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const msg = document.getElementById('msg');

    // Email + Password signup
    window.signup = () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if(password.length < 6){
        msg.style.color = '#f87171';
        msg.innerText = 'Password must be 6+ characters';
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          msg.style.color = '#4ade80';
          msg.innerText = 'Account created! Redirecting...';
          setTimeout(() => window.location.href = 'index.html', 1500);
        })
        .catch(e => {
          msg.style.color = '#f87171';
          msg.innerText = e.message.replace('Firebase: ', '');
        });
    }

    // Google login
    window.googleLogin = () => {
      signInWithPopup(auth, new GoogleAuthProvider())
        .then(() => {
          msg.style.color = '#4ade80';
          msg.innerText = 'Logged in with Google!';
          setTimeout(() => window.location.href = 'index.html', 1000);
        })
        .catch(e => msg.innerText = e.message);
    }

    // GitHub login
    window.githubLogin = () => {
      signInWithPopup(auth, new GithubAuthProvider())
        .then(() => {
          msg.style.color = '#4ade80';
          msg.innerText = 'Logged in with GitHub!';
          setTimeout(() => window.location.href = 'index.html', 1000);
        })
        .catch(e => msg.innerText = e.message);
    }

    // Check if already logged in
    onAuthStateChanged(auth, user => {
      if(user) msg.innerText = 'Already signed in as ' + user.email;
    });
  </script>
</body>
    </html>
